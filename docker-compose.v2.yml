services:
  backend-v2:
    build:
      context: .
      dockerfile: Dockerfile.backend.v2
    container_name: askanything-backend-v2
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      - API_PORT=8004
      - UVICORN_RELOAD=false
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:3002
      - DOWNLOAD_DIR=/app/downloads
    volumes:
      - ./api_server.py:/app/api_server.py
      - ./routes:/app/routes
      - ./modules:/app/modules
      - ./remotion/src:/app/remotion/src
      - ./assets:/app/assets
      - ./brand:/app/brand
      - ./client_secrets:/app/client_secrets
      - ./client_secret.json:/app/client_secret.json:ro
      - ./youtube_tokens:/app/youtube_tokens
      - ./tiktok_tokens:/app/tiktok_tokens
      - ${DOWNLOAD_DIR:-C:/Users/Storm Credit/Downloads}:/app/downloads
      - ${OBSIDIAN_VAULT:-C:/Users/Storm Credit/Desktop/쇼츠/askanything}:/app/obsidian
      - ./.env:/app/.env
      - ./vertex-sa-key.json:/app/vertex-sa-key.json:ro
      - ./vertex-sa-key-wonderdrop.json:/app/vertex-sa-key-wonderdrop.json:ro
      - ./vertex-sa-key-exploratodo.json:/app/vertex-sa-key-exploratodo.json:ro
      - ./vertex-sa-key-prismtale.json:/app/vertex-sa-key-prismtale.json:ro
    restart: unless-stopped

  frontend-v2:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8004
    container_name: askanything-frontend-v2
    ports:
      - "3002:3000"
    depends_on:
      - backend-v2
    restart: unless-stopped
