services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.v2
    container_name: askanything-backend
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - API_PORT=8003
      - UVICORN_RELOAD=false
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:3002
      - DOWNLOAD_DIR=/app/downloads
    volumes:
      - ./api_server.py:/app/api_server.py
      - ./routes:/app/routes
      - ./services:/app/services
      - ./modules:/app/modules
      - ./remotion/src:/app/remotion/src
      - ./assets:/app/assets
      - ./brand:/app/brand
      - ./client_secrets:/app/client_secrets
      - ./client_secret.json:/app/client_secret.json:ro
      - ./youtube_tokens:/app/youtube_tokens
      - ./tiktok_tokens:/app/tiktok_tokens
      - ${DOWNLOAD_DIR:-C:/Users/Storm Credit/Downloads}:/app/downloads
      - ${OBSIDIAN_VAULT:-C:/Users/Storm Credit/Desktop/쇼츠/askanything}:/app/obsidian
      - ./.env:/app/.env
      - ./vertex-sa-key-askanything.json:/app/vertex-sa-key-askanything.json:ro
      # wonderdrop SA키: 결제 미활성 → 활성화 후 주석 해제
      # - ./vertex-sa-key-wonderdrop.json:/app/vertex-sa-key-wonderdrop.json:ro
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8003
    container_name: askanything-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
